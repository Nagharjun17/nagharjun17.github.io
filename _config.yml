  I’m a Data Scientist at Mount Sinai, working on applying machine learning to healthcare problems. I have a Master’s in Computer Engineering from NYU, where I built a strong foundation in ML, deep learning, and signal processing.
  <br><br>
  Most of my recent work has been around time series modeling and transformer-based approaches for signal-to-signal tasks, particularly in respiratory flow prediction from plethysmography signals. I’m also interested in experimenting with different model architectures and running large models and algorithms on hardware efficiently.
  <br><br>
  Beyond my professional work, I enjoy playing football(soccer).
